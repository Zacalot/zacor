[package]
name = "zr-filter"
version = "0.1.0"
edition = "2024"
description = "Row filtering operations (skip, drop, uniq, uniq-by, compact, find)"

[lib]
name = "zr_filter"
path = "src/lib.rs"

[[bin]]
name = "filter"
path = "src/main.rs"

[dependencies]
zacor-package.workspace = true
serde.workspace = true
serde_json.workspace = true
regex = "1"

[build-dependencies]
zacor-package-build.workspace = true
