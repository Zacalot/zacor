name: filter
version: "0.1.0"
binary: filter
description: "Row filtering operations (skip, drop, uniq, uniq-by, compact, find)"
protocol: true
build:
  command: "cargo build --release --bin filter"
  output: ../../target/release
commands:
  skip:
    description: "Skip the first N records"
    args:
      count:
        type: integer
        required: true
    input: jsonl
    output:
      type: table
  drop:
    description: "Drop the last N records"
    args:
      count:
        type: integer
        default: 1
    input: jsonl
    output:
      type: table
  uniq:
    description: "Remove consecutive duplicate records"
    args:
      count:
        type: bool
        flag: count
      repeated:
        type: bool
        flag: repeated
      unique:
        type: bool
        flag: unique
      ignore-case:
        type: bool
        flag: ignore-case
    input: jsonl
    output:
      type: table
  uniq-by:
    description: "Deduplicate records by field(s)"
    args:
      fields:
        type: string
        required: true
      keep-last:
        type: bool
        flag: keep-last
    input: jsonl
    output:
      type: table
  compact:
    description: "Remove records with null values"
    args:
      fields:
        type: string
      empty:
        type: bool
        flag: empty
    input: jsonl
    output:
      type: table
  find:
    description: "Search records for matching terms"
    args:
      term:
        type: string
        required: true
      regex:
        type: bool
        flag: regex
      columns:
        type: string
      invert:
        type: bool
        flag: invert
      ignore-case:
        type: bool
        flag: ignore-case
    input: jsonl
    output:
      type: table
