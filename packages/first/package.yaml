name: first
version: "0.1.0"
binary: first
description: "Take first N records from stream"
protocol: true
build:
  command: "cargo build --release --bin first"
  output: ../../target/release
commands:
  default:
    description: "Take first N records from stream"
    args:
      count:
        type: integer
        default: 1
    input: jsonl
    output:
      type: table
