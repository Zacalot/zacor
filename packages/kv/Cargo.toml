[package]
name = "zr-kv"
version = "0.1.0"
edition = "2024"
description = "Key-value store"

[lib]
name = "zr_kv"
path = "src/lib.rs"

[[bin]]
name = "kv"
path = "src/main.rs"

[dependencies]
zacor-package.workspace = true
serde.workspace = true
serde_json.workspace = true

[build-dependencies]
zacor-package-build.workspace = true

[dev-dependencies]
tempfile = "3"
