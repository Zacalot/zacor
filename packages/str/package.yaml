name: str
version: "0.1.0"
binary: str
description: "String operations on record fields"
protocol: true
build:
  command: "cargo build --release --bin str"
  output: ../../target/release
commands:
  trim:
    description: "Trim whitespace or characters"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      char:
        type: string
      left:
        type: bool
        flag: left
      right:
        type: bool
        flag: right
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  replace:
    description: "Replace text in fields"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      find:
        type: string
        required: true
      replacement:
        type: string
        required: true
      all:
        type: bool
        flag: all
      regex:
        type: bool
        flag: regex
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  upcase:
    description: "Convert to uppercase"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  downcase:
    description: "Convert to lowercase"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  capitalize:
    description: "Capitalize first letter"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  reverse:
    description: "Reverse string"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  substring:
    description: "Extract substring"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      range:
        type: string
        required: true
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  contains:
    description: "Test if field contains string"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      term:
        type: string
        required: true
      ignore-case:
        type: bool
        flag: ignore-case
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  starts-with:
    description: "Test if field starts with string"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      term:
        type: string
        required: true
      ignore-case:
        type: bool
        flag: ignore-case
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  ends-with:
    description: "Test if field ends with string"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      term:
        type: string
        required: true
      ignore-case:
        type: bool
        flag: ignore-case
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  length:
    description: "Get string length"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  index-of:
    description: "Find index of substring"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      term:
        type: string
        required: true
      end:
        type: bool
        flag: end
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  split:
    description: "Split string by separator"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      separator:
        type: string
        required: true
      regex:
        type: bool
        flag: regex
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  join:
    description: "Join array into string"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      separator:
        type: string
        required: true
    input: jsonl
    inline-input-fallback: string-value
    output:
      type: table
  parse:
    description: "Parse string with pattern"
    args:
      value:
        type: string
      fields:
        type: string
        flag: fields
      pattern:
        type: string
        required: true
      regex:
        type: bool
        flag: regex
    input: jsonl
    output:
      type: table
