[package]
name = "zr-treesitter"
version = "0.1.0"
edition = "2024"
description = "Tree-sitter declaration extraction package"

[lib]
name = "zr_treesitter"
path = "src/lib.rs"

[[bin]]
name = "zr-treesitter"
path = "src/main.rs"

[dependencies]
zacor-package.workspace = true
serde.workspace = true
serde_json.workspace = true
tree-sitter = "0.26"
tree-sitter-javascript = "0.25"
tree-sitter-python = "0.25"
tree-sitter-rust = "0.24"
tree-sitter-typescript = "0.23"

[build-dependencies]
zacor-package-build.workspace = true
