name: wc
version: "0.2.0"
binary: wc
description: "Count lines, words, and bytes"
protocol: true
build:
  command: "cargo build --release --bin wc"
  output: ../../target/release
commands:
  default:
    description: "Count file statistics"
    args:
      file:
        type: path
    input: text
    output:
      type: record
      schema:
        file: string
        lines: number
        words: number
        bytes: number
